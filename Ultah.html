<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untukmu...</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #050505, #000);
  font-family: Georgia, serif;
  color: #ddd;
}

/* TEXT */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  transition: opacity 2s ease;
  z-index: 3;
}

h1 { color: #ff6b81; font-weight: normal; }
p { line-height: 1.8; color: #bbb; }

button {
  margin-top: 25px;
  padding: 10px 22px;
  border: none;
  border-radius: 20px;
  background: #ff6b81;
  color: white;
  cursor: pointer;
}

/* FINAL TEXT */
.finalText {
  position: absolute;
  width: 100%;
  top: 45%;
  text-align: center;
  font-size: 2em;
  opacity: 0;
  transition: opacity 3s ease;
  color: #ff6b81;
  z-index: 3;
}

/* CANVAS */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="content" id="text">
  <h1>Selamat Ulang Tahun 🎂</h1>
  <p>
    Aku kira waktu bisa membuatku biasa saja...<br>
    ternyata tidak.<br><br>
    Ada hal-hal yang tetap tinggal,<br>
    meski orangnya sudah pergi.<br><br>
    Dan kamu...<br>
    masih jadi salah satunya 💔
  </p>
  <button onclick="startShow()">Klik perlahan...</button>
</div>

<div class="finalText" id="finalText">
  Selamat Ulang Tahun,<br>
  Nurul Fatimah Assofi 💖<br><br>
  <small style="color:#888;font-size:0.5em;">
    Semoga Kamu Selalu Bahagia, My Princess
  </small>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rockets = [];
let particles = [];
let rain = [];

/* START */
function startShow() {
  document.getElementById("text").style.opacity = 0;

  // play music
  document.getElementById("music").play();

  setTimeout(() => {
    launchRocket();
  }, 1500);
}

/* ROCKET */
function launchRocket() {
  rockets.push({
    x: canvas.width / 2,
    y: canvas.height,
    targetY: canvas.height / 3,
    speed: 4
  });
}

/* HEART EXPLOSION */
function createHeartExplosion(x, y) {
  for (let t = 0; t < Math.PI * 2; t += 0.15) {
    let hx = 16 * Math.pow(Math.sin(t), 3);
    let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

    particles.push({
      x: x,
      y: y,
      dx: hx * 0.25,
      dy: hy * 0.25,
      life: 150
    });
  }

  setTimeout(() => {
    document.getElementById("finalText").style.opacity = 1;
  }, 1000);
}

/* RAIN SETUP */
for (let i = 0; i < 200; i++) {
  rain.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    length: Math.random() * 20,
    speed: Math.random() * 4 + 2
  });
}

/* ANIMATION */
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Rain
  ctx.strokeStyle = "rgba(200,200,255,0.3)";
  ctx.lineWidth = 1;
  rain.forEach(r => {
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x, r.y + r.length);
    ctx.stroke();

    r.y += r.speed;
    if (r.y > canvas.height) {
      r.y = -10;
      r.x = Math.random() * canvas.width;
    }
  });

  // Rocket
  rockets.forEach((r, i) => {
    r.y -= r.speed;
    ctx.fillStyle = "#fff";
    ctx.fillRect(r.x, r.y, 2, 8);

    if (r.y <= r.targetY) {
      createHeartExplosion(r.x, r.y);
      rockets.splice(i, 1);
    }
  });

  // Particles
  particles.forEach((p, i) => {
    p.x += p.dx;
    p.y += p.dy;
    p.life--;

    ctx.fillStyle = "#ff6b81";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
